<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTF Pro - Sistema de Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FA;--surface:#FFFFFF;--surface2:#F1F3F5;
  --border:#E9ECEF;--border2:#DEE2E6;
  --text:#212529;--text2:#6C757D;--text3:#ADB5BD;
  --green:#2D6A2D;--green-bg:#EAF3EA;--green-mid:#4A9E4A;
  --blue:#1A4A7C;--blue-bg:#E8F0FB;--blue-mid:#2E6DB4;
  --amber:#7A4F00;--amber-bg:#FFF3CD;
  --red:#8B1A1A;--red-bg:#FDECEA;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
/* -- TEMA ESCURO -- */
[data-theme="dark"]{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#22263A;
  --border:#2C3050;--border2:#363B5E;
  --text:#E8EAF6;--text2:#9097C0;--text3:#565E8A;
  --green:#4CAF50;--green-bg:#1B3320;--green-mid:#66BB6A;
  --blue:#5B8DEF;--blue-bg:#1A2540;--blue-mid:#5B8DEF;
  --amber:#FFB74D;--amber-bg:#2D2000;
  --red:#EF5350;--red-bg:#2D1515;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
}
/* -- TEMA DTF (verde escuro profissional) -- */
[data-theme="dtf"]{
  --bg:#0D1F0D;--surface:#122012;--surface2:#1A2E1A;
  --border:#243824;--border2:#2E4A2E;
  --text:#E8F5E8;--text2:#8BB88B;--text3:#4A724A;
  --green:#66BB6A;--green-bg:#1B3A1B;--green-mid:#81C784;
  --blue:#4FC3F7;--blue-bg:#0D2535;--blue-mid:#4FC3F7;
  --amber:#FFD54F;--amber-bg:#2D2500;
  --red:#EF9A9A;--red-bg:#2D1515;
  --shadow:0 1px 3px rgba(0,0,0,.5);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
/* -- LAYOUT -- */
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow:hidden}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:24px;flex:1;overflow-y:auto;overflow-x:hidden}
/* -- SIDEBAR -- */
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:16px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav-section{padding:12px 8px 4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s;margin-bottom:1px;text-decoration:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--green-bg);color:var(--green);font-weight:500}
.nav-item i{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.sidebar-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer}
.user-card:hover{background:var(--surface2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
/* -- COMPONENTS -- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.kpi-l{font-size:12px;color:var(--text2);margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:600;color:var(--text)}
.kpi-s{font-size:11px;color:var(--text3);margin-top:2px}
/* -- FORM -- */
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.f label{font-size:12px;font-weight:500;color:var(--text2)}
.f input,.f select,.f textarea{padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;width:100%;font-family:'Inter',sans-serif;transition:border-color .12s}
.f input:focus,.f select:focus{outline:none;border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(46,109,180,.1)}
/* -- BUTTONS -- */
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-family:'Inter',sans-serif}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--green);color:#fff;border-color:var(--green)}.btn-p:hover{background:#235023;border-color:#235023}
.btn-b{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-b:hover{background:#153d6b;border-color:#153d6b}
.btn-r{color:var(--red);border-color:#f5c2c2}.btn-r:hover{background:var(--red-bg)}
.btn-full{width:100%;justify-content:center;padding:10px}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
/* -- BADGE -- */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-g{background:var(--green-bg);color:var(--green)}
.b-b{background:var(--blue-bg);color:var(--blue)}
.b-a{background:var(--amber-bg);color:var(--amber)}
.b-r{background:var(--red-bg);color:var(--red)}
.b-gray{background:var(--surface2);color:var(--text2)}
/* -- TABLE -- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;font-size:12px;white-space:nowrap;background:var(--surface2)}
.tbl th:first-child{border-radius:var(--radius) 0 0 0}
.tbl th:last-child{border-radius:0 var(--radius) 0 0}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface2)}
/* -- ALERT -- */
.alert{border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;font-size:13px;display:flex;align-items:flex-start;gap:8px;border:1px solid}
.alert-r{background:var(--red-bg);border-color:#f5c2c2;color:var(--red)}
.alert-a{background:var(--amber-bg);border-color:#ffd97a;color:var(--amber)}
.alert-g{background:var(--green-bg);border-color:#b3d9b3;color:var(--green)}
/* -- MISC -- */
.hidden{display:none!important}
.pbar{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.pbar-fill{height:100%;border-radius:4px;transition:width .3s}
.divider{height:1px;background:var(--border);margin:12px 0}
.loading{text-align:center;padding:3rem;color:var(--text3)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:-2px}
.spin-dark{border-color:var(--border);border-top-color:var(--text2)}
@keyframes sp{to{transform:rotate(360deg)}}
/* -- LOGIN -- */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:360px;box-shadow:var(--shadow)}
/* -- TOAST -- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.on{opacity:1}
/* -- TABS -- */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-weight:500;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.tab-btn:hover{color:var(--text)}
.tab-btn.on{color:var(--green);border-bottom-color:var(--green)}
/* -- MODAL -- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)}
/* -- RESPONSIVE -- */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;height:100vh}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
}
/* Forçar ocupar toda a altura disponível */
html,body{height:100%;max-height:100vh;overflow:hidden}
.shell{height:100vh;max-height:100vh;overflow:hidden}
</style>
</head>
<body>

<!-- === LOGIN === -->
<div id="login-page" class="login-page">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:52px;height:52px;background:var(--green-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <i class="ti ti-printer" style="font-size:26px;color:var(--green)"></i>
      </div>
      <p style="font-size:20px;font-weight:600">DTF Pro</p>
      <p style="font-size:13px;color:var(--text2);margin-top:4px">Sistema de Gestão de Produção</p>
    </div>
    <div class="f"><label>Login</label><input id="l-login" placeholder="seu login" autocomplete="username"></div>
    <div class="f"><label>Senha</label><input id="l-senha" type="password" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn btn-p btn-full" style="margin-top:4px" onclick="doLogin()">
      <i class="ti ti-login"></i> Entrar
    </button>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px">
      admin/admin123 . op1/op1234 . op2/op2234
    </p>
  </div>
</div>

<!-- === SHELL === -->
<div id="shell" class="shell hidden">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;background:var(--green-bg);border-radius:8px;display:flex;align-items:center;justify-content:center">
          <i class="ti ti-printer" style="font-size:18px;color:var(--green)"></i>
        </div>
        <div>
          <p class="logo-title">DTF Pro</p>
          <p class="logo-sub">Gestão de Produção</p>
        </div>
      </div>
    </div>

    <div style="overflow-y:auto;flex:1;padding:8px">
      <div class="nav-section">
        <p class="nav-label">Principal</p>
        <a class="nav-item active" id="nav-dashboard" onclick="goNav('dashboard')"><i class="ti ti-chart-bar"></i>Dashboard</a>
        <a class="nav-item" id="nav-alertas" onclick="goNav('alertas')"><i class="ti ti-bell"></i>Alertas<span class="nav-badge" id="badge-alertas">0</span></a>
      </div>
      <div class="nav-section" id="nav-admin-section">
        <p class="nav-label">Comercial</p>
        <a class="nav-item" id="nav-clientes" onclick="goNav('clientes')"><i class="ti ti-users"></i>Clientes</a>
        <a class="nav-item" id="nav-pedidos" onclick="goNav('pedidos')"><i class="ti ti-file-invoice"></i>Pedidos</a>
        <a class="nav-item" id="nav-financeiro" onclick="goNav('financeiro')"><i class="ti ti-currency-dollar"></i>Financeiro</a>
      </div>
      <div class="nav-section">
        <p class="nav-label">Operação</p>
        <a class="nav-item" id="nav-producao" onclick="goNav('producao')"><i class="ti ti-printer"></i>Produção</a>
        <a class="nav-item" id="nav-importar" onclick="goNav('importar')"><i class="ti ti-upload"></i>Importar</a>
        <a class="nav-item" id="nav-insumos" onclick="goNav('insumos')"><i class="ti ti-package"></i>Insumos</a>
      </div>
      <div class="nav-section" id="nav-admin-section2">
        <p class="nav-label">Análise</p>
        <a class="nav-item" id="nav-relatorios" onclick="goNav('relatorios')"><i class="ti ti-file-analytics"></i>Relatórios</a>
        <a class="nav-item" id="nav-config" onclick="goNav('config')"><i class="ti ti-settings"></i>Configurações</a>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-card" onclick="logout()">
        <div class="avatar" id="user-avatar">EB</div>
        <div style="flex:1;min-width:0">
          <p style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-name">Eduardo</p>
          <p style="font-size:11px;color:var(--text3)" id="user-role">Admin</p>
        </div>
        <i class="ti ti-logout" style="font-size:15px;color:var(--text3)"></i>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-sm" id="menu-toggle" style="display:none" onclick="toggleMenu()"><i class="ti ti-menu-2"></i></button>
        <p style="font-size:15px;font-weight:600" id="page-title">Dashboard</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--text2)" id="top-date"></span>
        <div style="display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius);padding:3px">
          <button onclick="setTheme('light')" id="theme-light" title="Tema claro"
            style="width:28px;height:24px;border:none;border-radius:5px;cursor:pointer;font-size:13px;transition:all .15s"
            class="">☀️</button>
          <button onclick="setTheme('dark')" id="theme-dark" title="Tema escuro"
            style="width:28px;height:24px;border:none;border-radius:5px;cursor:pointer;font-size:13px;transition:all .15s"
            class="">🌙</button>
          <button onclick="setTheme('dtf')" id="theme-dtf" title="Tema DTF"
            style="width:28px;height:24px;border:none;border-radius:5px;cursor:pointer;font-size:13px;transition:all .15s"
            class="">🖨️</button>
        </div>
        <button class="btn btn-sm" onclick="syncData()" id="btn-sync" title="Sincronizar dados">
          <i class="ti ti-refresh"></i>
        </button>
      </div>
    </div>

    <div class="content" id="main-content">
      <div class="loading"><span class="spin spin-dark"></span></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=1780145277"></script>
</body>
</html>
